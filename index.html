<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTB Home Solutions - Buyers List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #173A8F;
      text-align: center;
      padding: 50px;
      color: #173A8F;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .logo {
      width: 200px;
      margin-bottom: 20px;
    }

    h1 {
      color: #173A8F;
      margin-bottom: 10px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.15);
    }

    /* 🔥 ONLY affects the "Join..." line */
    .main-text {
      color: #173A8F;
      margin-bottom: 25px;
      font-weight: 500; /* ✅ what you wanted */
      line-height: 1.5;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 2px solid #173A8F;
  border-radius: 6px;
  font-size: 14px;
  color: #173A8F;
  font-weight: 600;
  box-sizing: border-box;
}

    input::placeholder {
      color: #6b7280;
      font-weight: 600;
    }

    button {
      padding: 12px;
      width: 100%;
      background: #16a34a;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-sizing: border-box;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
      color: #173A8F;
    }

    .note {
      font-size: 12px;
      color: gray;
      margin-top: 15px;
    }

    @media (max-width: 600px) {
  body {
    padding: 20px;
  }

  .container {
    padding: 25px;
  }

  h1 {
    font-size: 22px;
  }

  input, button {
    width: 100%;
    font-size: 16px;
  }

  .logo {
    width: 150px;
  }
}
  </style>
</head>

<body>

<div class="container">

  <img src="logo.jpg" class="logo" alt="OTB Home Solutions Logo">

  <h1>Get Access to Off-Market Deals</h1>

  <!-- ✅ ONLY this line is affected -->
  <p class="main-text">
    Join our buyers list to receive priority notifications on new investment opportunities.
  </p>

  <form id="buyerForm">
    <input type="text" name="firstname" placeholder="First Name" required />
    <input type="text" name="lastname" placeholder="Last Name" required />
    <input type="email" name="email" placeholder="Email Address" required />
    <input type="text" name="company" placeholder="Company Name (Optional)" />
    <input type="text" name="phone" placeholder="Phone Number (Optional)" />
    <button type="submit">Join Buyers List</button>
  </form>

  <p id="status"></p>

  <div class="note">
  By joining, you agree to receive emails about investment opportunities from OTB Home Solutions and its affiliates. You can unsubscribe at any time.
</div>

</div>

<script>
document.getElementById("buyerForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = {
  firstName: this.firstName.value,
  lastName: this.lastName.value,
  email: this.email.value,
  company: this.company.value,
  phone: this.phone.value
};

  fetch("https://script.google.com/macros/s/AKfycbzR4ygYNwqCkMCcb_LQr_YXGDyxwBWhmP1ar56_D17PmKesE6tACf1FgEjp1FnW-d7hxQ/exec", {
    method: "POST",
    body: JSON.stringify(formData)
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("status").innerText = "✅ GREAT! You're on the list!";
    document.getElementById("buyerForm").reset();
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ Form not sent";
    console.error(err);
  });
});
</script>

</body>
</html>
