<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Our Buyers List</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      margin-bottom: 30px;
      font-size: 16px;
      color: #cbd5e1;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #22c55e;
      color: white;
      transition: 0.3s ease;
    }
    button:hover {
      background: #16a34a;
    }
    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="OTBHS Logo.jpg" alt="OTB Home Solutions Logo" style="max-width: 220px; margin-bottom: 20px; border-radius: 8px;">
    <h1>Get Access to Our Off-Market Deals</h1>
    <p>Join our buyers list to receive notifications on new investment opportunities.</p>
    <!-- Replace the action URL below with your deployed Google Apps Script Web App URL -->
    <https://script.google.com/macros/u/3/s/AKfycbyEQUzT-lqOabwUJ-wOAw4M9UR1LDFMq__DvCTQPAbZXi42E7CeaHQvb0iBX-OWES8OmQ/exec>
      <input type="text" name="name" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Email Address" required />
      <input type="text" name="phone" placeholder="Phone Number (Optional)" />
      <button type="submit">Join Buyers List</button>
    </form>
    <div class="note">We respect your privacy. No spam. Unsubscribe anytime.</div>
  </div>
</body>
</html>
