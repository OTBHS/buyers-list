<!DOCTYPE html>
<html>
<head>
  <title>OTB Home Solutions - Buyers List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #173A8F;
      text-align: center;
      padding: 50px;
      color: #173A8F;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .logo {
      width: 200px;
      margin-bottom: 20px;
    }

    h1 {
      color: #173A8F;
      margin-bottom: 10px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.15);
    }

    /* 🔥 ONLY affects the "Join..." line */
    .main-text {
      color: #173A8F;
      margin-bottom: 25px;
      font-weight: 500; /* ✅ what you wanted */
      line-height: 1.5;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    input {
      width: 95%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #173A8F;
      border-radius: 6px;
      font-size: 14px;
      color: #173A8F;
      font-weight: 600;
    }

    input::placeholder {
      color: #6b7280;
      font-weight: 600;
    }

    button {
      padding: 12px;
      width: 95%;
      background: #16a34a;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
      color: #173A8F;
    }

    .note {
      font-size: 12px;
      color: gray;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <img src="logo.jpg" class="logo" alt="OTB Home Solutions Logo">

  <h1>Get Access to Off-Market Deals</h1>

  <!-- ✅ ONLY this line is affected -->
  <p class="main-text">
    Join our exclusive buyers list to receive priority notifications on new investment opportunities.
  </p>

  <form id="buyerForm">
    <input type="text" name="name" placeholder="Full Name" required />
    <input type="email" name="email" placeholder="Email Address" required />
    <input type="text" name="phone" placeholder="Phone Number (Optional)" />
    <button type="submit">Join Buyers List</button>
  </form>

  <p id="status"></p>

  <div class="note">
    We respect your privacy. No spam. Unsubscribe anytime.
  </div>

</div>

<script>
document.getElementById("buyerForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = {
    name: this.name.value,
    email: this.email.value,
    phone: this.phone.value
  };

  fetch("https://script.google.com/macros/s/AKfycbwWKD0eFlAgh4PHAQh9xHhMCG3H7aq6zd_YqNtORrCT9oTJwp114sZoqvHfH9qS5RPqHA/exec", {
    method: "POST",
    body: JSON.stringify(formData)
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("status").innerText = "✅ GREAT!! You're on the list!";
    document.getElementById("buyerForm").reset();
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ Form not sent";
    console.error(err);
  });
});
</script>

</body>
</html>
