<!DOCTYPE html>
<html>
<head>
  <title>OTB Home Solutions - Buyers List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 50px;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
    .note {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Get Access to Off-Market Deals</h1>
  <p>Join our exclusive buyers list to receive priority notifications on new investment opportunities.</p>

  <form id="buyerForm">
    <input type="text" name="name" placeholder="Full Name" required />
    <input type="email" name="email" placeholder="Email Address" required />
    <input type="text" name="phone" placeholder="Phone Number (Optional)" />
    <button type="submit">Join Buyers List</button>
  </form>

  <p id="status"></p>

  <div class="note">We respect your privacy. No spam. Unsubscribe anytime.</div>
</div>

<script>
document.getElementById("buyerForm").addEventListener("submit", function(e) {
  e.preventDefault();

  console.log("FORM SUBMITTED");

  const formData = {
    name: this.name.value,
    email: this.email.value,
    phone: this.phone.value
  };

  fetch("https://script.google.com/macros/s/AKfycby1yCFifge8h7MnsCWI3oAIImnKFQcoX-zlZqNbmLlc9FXih6wwpipmiIVHrGSPbWCoqA/exec", {
    method: "POST",
    body: JSON.stringify(formData)
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("status").innerText = "✅ You're on the list!";
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ Form not sent";
    console.error("ERROR:", err);
  });
});
</script>

</body>
</html>
